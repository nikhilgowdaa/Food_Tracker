<!-- Activities & Habits -->
    <section class="activities">
      <h2 class="section-title">Log Activities</h2>
      <div class="activities-grid">
        <button class="glass btn-activity" data-activity="gym">🏋️ Gym (+10)</button>
        <button class="glass btn-activity" data-activity="football">⚽ Football (+10)</button>
        <button class="glass btn-activity" data-activity="water">💧 Water Target (+10)</button>
        <button class="glass btn-activity danger" data-activity="sugar">🍩 Sugary Food (-15)</button>
      </div>
    </section>

    <!-- Breakfast Builder -->
    <section class="meal-logger">
      <h2 class="section-title">Breakfast Builder</h2>
      <div class="glass card meal-card">
        <select id="breakfastSelect" class="apple-select">
          <option value="idli">Idli (per piece)</option>
          <option value="dosa">Plain Dosa (1 medium)</option>
          <option value="set_dosa">Set Dosa (1 set of 3)</option>
          <option value="rava_dosa">Rava Dosa (1 medium)</option>
          <option value="poha">Poha (1 medium bowl)</option>
          <option value="upma">Upma (1 medium bowl)</option>
          <option value="oats">Oats (1 medium bowl)</option>
          <option value="brown_bread">Brown Bread (2 slices)</option>
          <option value="eggs">Boiled Eggs (1 egg)</option>
          <option value="whey">Whey Protein (1 scoop)</option>
        </select>
        
        <div class="quantity-row">
          <label for="breakfastQty">Quantity:</label>
          <input type="number" id="breakfastQty" class="apple-input" value="1" min="1" max="10">
        </div>

        <button class="btn-primary" id="logBreakfastBtn">Log Breakfast</button>
      </div>
    </section>

    <!-- Toast Notification Container -->
    <div id="toast" class="toast hidden">Activity Logged!</div>
