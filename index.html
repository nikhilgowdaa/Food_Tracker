<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Liver Pro" />
  <meta name="description" content="Intelligent nutrition planner to reverse fatty liver, lower LDL and build muscle." />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icon-180.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>Fatty Liver Tracker Pro</title>
</head>
<body>
  <!-- App shell -->
  <div id="app">

    <!-- ===== Top bar ===== -->
    <header class="topbar glass">
      <div class="topbar-inner">
        <h1 id="viewTitle">Today</h1>
        <div class="topbar-right">
          <span id="dateLabel" class="date-label"></span>
          <button id="themeToggle" class="icon-btn" aria-label="Toggle theme">◐</button>
        </div>
      </div>
    </header>

    <!-- ===== Scroll area / views ===== -->
    <main id="main">

      <!-- ============ TODAY / DASHBOARD ============ -->
      <section class="view" id="view-today">
        <!-- Day selector -->
        <div class="day-strip" id="dayStrip"></div>
        <div class="diet-badge-row">
          <span id="dietBadge" class="diet-badge"></span>
          <button id="dietOverride" class="mini-btn">Override</button>
        </div>

        <!-- Liver score ring (compact) -->
        <div class="card glass score-card">
          <canvas id="scoreRing" class="score-ring" height="76"></canvas>
          <div class="score-meta">
            <h2>Liver Score</h2>
            <p id="scoreVerdict" class="score-verdict"></p>
          </div>
          <button id="scoreWhy" class="mini-btn score-why">Why?</button>
        </div>

        <!-- Activity target adjustment note -->
        <div id="activityNote" class="activity-note" hidden></div>

        <!-- Macro cards -->
        <div class="macro-grid" id="macroGrid"></div>

        <!-- Activity toggles -->
        <div class="card glass">
          <div class="row-between toggle-row">
            <div><div class="row-title">💪 Gym Today</div><div class="row-sub" id="gymSub"></div></div>
            <label class="switch"><input type="checkbox" id="gymToggle"><span class="slider"></span></label>
          </div>
          <div class="seg" id="gymDuration"></div>
          <hr class="divider" />
          <div class="row-between toggle-row">
            <div><div class="row-title">⚽ Football Today</div><div class="row-sub" id="fbSub"></div></div>
            <label class="switch"><input type="checkbox" id="fbToggle"><span class="slider"></span></label>
          </div>
          <div class="seg" id="fbTime"></div>
          <hr class="divider" />
          <div class="row-between toggle-row">
            <div><div class="row-title">🚶 Walked after meals</div></div>
            <label class="switch"><input type="checkbox" id="walkToggle"><span class="slider"></span></label>
          </div>
        </div>

        <!-- Coaching notifications -->
        <div id="coachList"></div>
      </section>

      <!-- ============ LOG / MEAL BUILDERS ============ -->
      <section class="view" id="view-log" hidden>
        <div class="seg meal-seg" id="mealSeg"></div>
        <div id="builderArea"></div>
      </section>

      <!-- ============ STATS / ANALYTICS ============ -->
      <section class="view" id="view-stats" hidden>
        <div class="seg" id="statRange"></div>
        <div id="statsArea"></div>
      </section>

      <!-- ============ BLOOD ============ -->
      <section class="view" id="view-blood" hidden>
        <div id="bloodArea"></div>
      </section>

      <!-- ============ MORE ============ -->
      <section class="view" id="view-more" hidden>
        <div id="moreArea"></div>
      </section>

    </main>

    <!-- ===== Bottom tab bar ===== -->
    <nav class="tabbar glass" id="tabbar">
      <button class="tab active" data-view="today"><span class="tab-ic">🏠</span><span>Today</span></button>
      <button class="tab" data-view="log"><span class="tab-ic">🍽️</span><span>Log</span></button>
      <button class="tab" data-view="stats"><span class="tab-ic">📈</span><span>Stats</span></button>
      <button class="tab" data-view="blood"><span class="tab-ic">🩸</span><span>Blood</span></button>
      <button class="tab" data-view="more"><span class="tab-ic">⚙️</span><span>More</span></button>
    </nav>
  </div>

  <!-- Modal host -->
  <div id="modalHost" class="modal-host" hidden>
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal glass" id="modalCard">
      <div class="modal-head">
        <h3 id="modalTitle"></h3>
        <button class="icon-btn" id="modalClose">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Scripts (order matters: data → storage → engine → charts → blood → app) -->
  <script src="nutrition-data.js"></script>
  <script src="storage.js"></script>
  <script src="meal-engine.js"></script>
  <script src="charts.js"></script>
  <script src="blood-report.js"></script>
  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
